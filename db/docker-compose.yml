services:
  mysql_db:
    container_name: mysql_db
    image: mysql:8.4
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: password
      TZ: Asia/Seoul
      LANG: UTF-8
    volumes:
      - "./mysql:/var/lib/mysql"

  adminer:
    container_name: adminer
    image: adminer
    ports:
      - "8010:8080"
